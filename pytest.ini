[pytest]
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function
testpaths = tests/integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --import-mode=importlib -v --tb=short --timeout=60
markers =
    integration: Integration tests (requires browser)
    slow: Slow running tests

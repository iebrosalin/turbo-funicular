<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Asset Manager{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}

    {% include 'components/modals.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    
    {% block extra_js %}{% endblock %}
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initTheme === 'function') initTheme();
            
            const groupTreeEl = document.getElementById('group-tree');
            if (groupTreeEl && typeof refreshGroupTree === 'function') {
                refreshGroupTree();
                setInterval(refreshGroupTree, 30000);
            }
            
            const activeScansEl = document.getElementById('active-scans');
            if (activeScansEl && typeof pollActiveScans === 'function') {
                pollActiveScans();
                setInterval(pollActiveScans, 5000);
            }
        });
    </script>
</body>
</html>

<!-- components/group_tree.html -->
<!-- Компонент дерева групп для sidebar в base.html -->
<div class="sidebar-section">
    <div class="d-flex justify-content-between align-items-center sidebar-section-title">
        <span>Группы активов</span>
        <button class="btn btn-sm btn-link p-0" onclick="window.showCreateGroupModal(null)" title="Создать группу">
            <i class="bi bi-plus-circle"></i>
        </button>
    </div>
    <div id="group-tree" class="group-tree">
        <!-- Заполняется через JS (modules/tree.js) -->
        <div class="text-center text-muted small py-3">Загрузка...</div>
    </div>
</div>

<!-- Активные сканирования -->
<div class="sidebar-section">
    <div class="sidebar-section-title">Активные задачи</div>
    <div id="active-scans-list">
        <!-- Заполняется через JS (modules/groups.js) -->
        <div class="text-center text-muted small py-3">Нет активных задач</div>
    </div>
</div>

<script type="module">
    import { refreshGroupTree, initTreeTogglers } from '{{ url_for("static", filename="js/modules/tree.js") }}';
    import { 
        initActiveScans, 
        showCreateGroupModal,
        showRenameModal,
        showDeleteModal
    } from '{{ url_for("static", filename="js/modules/groups.js") }}';

    document.addEventListener('DOMContentLoaded', () => {
        // Инициализация дерева групп
        const treeContainer = document.getElementById('group-tree');
        if (treeContainer && !window.groupTreeInitialized) {
            window.groupTreeInitialized = true;
            refreshGroupTree().then(() => {
                if (typeof window.initTreeTogglers === 'function') {
                    window.initTreeTogglers();
                } else {
                    initTreeTogglers();
                }
            });
        }

        // Инициализация активных сканирований
        initActiveScans();

        // Экспорт функций в глобальную область видимости
        window.showCreateGroupModal = showCreateGroupModal;
        window.refreshGroupTree = refreshGroupTree;
        window.showRenameModal = showRenameModal;
        window.showDeleteModal = showDeleteModal;
        
        // Экспорт filterByGroup и loadAssets для SPA функционала на странице сканирований
        if (typeof window.filterByGroup === 'undefined') {
            import('{{ url_for("static", filename="js/modules/tree.js") }}').then(module => {
                window.filterByGroup = module.filterByGroup;
                window.loadAssets = module.loadAssets;
            });
        }
    });
</script>

<div class="group-tree-container">
    <!-- Заголовок секции -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="mb-0 text-uppercase text-muted small fw-bold">
            <i class="bi bi-folder-tree me-2"></i>Группы активов
        </h6>
        <button class="btn btn-sm btn-outline-primary" onclick="showCreateGroupModal(null)" title="Новая группа">
            <i class="bi bi-plus-lg"></i>
        </button>
    </div>
    
    <!-- 🔹 Дерево групп: рендерится полностью через JS -->
    <div id="group-tree" class="group-tree">
        <div class="text-muted small"><i class="bi bi-hourglass-split"></i> Загрузка...</div>
    </div>
    
    <!-- 🔹 Кнопка создания корневой группы -->
    <div class="mt-3 pt-3 border-top">
        <button class="btn btn-sm btn-outline-secondary w-100" onclick="showCreateGroupModal(null)">
            <i class="bi bi-plus-lg me-1"></i>Новая группа
        </button>
    </div>
    
    <!-- 🔹 Блок активных сканирований (в сайдбаре) -->
    <div class="mt-4 pt-3 border-top">
        <h6 class="text-uppercase text-muted small fw-bold mb-3">
            <i class="bi bi-activity me-2"></i>Активные сканирования
        </h6>
        <div id="active-scans-list">
            <div class="text-center text-muted small py-2">
                <i class="bi bi-check-circle"></i> Нет активных задач
            </div>
        </div>
    </div>
</div>
<!-- Скрипт для инициализации дерева групп и активных сканирований -->
<script type="module">
    import { refreshGroupTree, initTreeTogglers } from '{{ url_for("static", filename="js/modules/tree.js") }}';
    import { initActiveScans, showCreateGroupModal } from '{{ url_for("static", filename="js/modules/groups.js") }}';

    document.addEventListener('DOMContentLoaded', () => {
        // Инициализация дерева групп (только если это не было сделано в base.html)
        const treeContainer = document.getElementById('group-tree');
        if (treeContainer && !window.groupTreeInitialized) {
            window.groupTreeInitialized = true;
            refreshGroupTree().then(() => {
                if (typeof window.initTreeTogglers === 'function') {
                    window.initTreeTogglers();
                } else {
                    initTreeTogglers();
                }
            });
        }

        // Инициализация монитора сканирований (только если это не было сделано в base.html)
        const scansContainer = document.getElementById('active-scans-list');
        if (scansContainer && !window.activeScansInitialized) {
            window.activeScansInitialized = true;
            initActiveScans();
        }

        // Экспорт функций в глобальную область видимости
        window.showCreateGroupModal = showCreateGroupModal;
        window.refreshGroupTree = refreshGroupTree;
    });
</script>

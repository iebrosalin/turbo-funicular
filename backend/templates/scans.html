<!-- templates/scans.html -->
{% extends "base.html" %}

{% block title %}Управление сканированиями{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <!-- Таблица сканирований -->
    <div class="row">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-list-task"></i> История сканирований</h5>
                    <button class="btn btn-sm btn-outline-secondary" id="refreshScansBtn">
                        <i class="bi bi-arrow-clockwise"></i> Обновить
                    </button>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Цель</th>
                                    <th>Тип</th>
                                    <th>Статус</th>
                                    <th>Прогресс</th>
                                    <th>Создано</th>
                                    <th>Завершено</th>
                                    <th>Действия</th>
                                </tr>
                            </thead>
                            <tbody id="scansTableBody">
                                <tr>
                                    <td colspan="8" class="text-center text-muted py-4">Загрузка...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно просмотра результатов -->
<div class="modal fade" id="scanResultModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Результаты сканирования</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="scanResultContent">
                <div class="text-center py-4">Загрузка...</div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

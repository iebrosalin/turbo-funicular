<!-- components/group_tree.html -->
<!-- Компонент дерева групп для sidebar в base.html -->
<div class="sidebar-section">
    <div class="d-flex justify-content-between align-items-center sidebar-section-title">
        <span>Группы активов</span>
        <button class="btn btn-sm btn-link p-0" id="btn-create-group" title="Создать группу">
            <i class="bi bi-plus-circle"></i>
        </button>
    </div>
    
    <div id="group-tree" class="group-tree">
        <!-- Статический элемент: Все активы (НЕ удаляется при обновлении) -->
        <div class="tree-node active" data-id="all">
            <i class="bi bi-globe folder-icon"></i>
            <span class="group-name" data-id="all">Все активы</span>
            <span class="badge bg-primary ms-auto" id="count-all">0</span>
        </div>
                <!-- Статический элемент: Без группы (НЕ удаляется при обновлении) -->
        <div class="tree-node" data-id="ungrouped" style="margin-top: 5px; border-top: 1px solid var(--bs-border-color); padding-top: 5px;">
            <i class="bi bi-inbox folder-icon"></i>
            <span class="group-name" data-id="ungrouped">Без группы</span>
            <span class="badge bg-secondary ms-auto" id="count-ungrouped">0</span>
        </div>

        <!-- Динамический контейнер для вложенных групп (Очищается JS) -->
        <div id="group-tree-root" style="padding-left: 0;">
            <!-- Сюда JS будет рендерить дерево групп -->
            <div class="text-center text-muted small py-3">Загрузка...</div>
        </div>

    </div>
</div>

<!-- Активные сканирования -->
<div class="sidebar-section">
    <div class="sidebar-section-title">Активные задачи</div>
    <div id="active-scans-list">
        <!-- Заполняется через JS (modules/groups.js) -->
        <div class="text-center text-muted small py-3">Нет активных задач</div>
    </div>
</div>

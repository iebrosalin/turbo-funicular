<!-- components/group_tree.html -->
<!-- Компонент дерева групп для sidebar в base.html -->
<div class="sidebar-section">
    <div class="d-flex justify-content-between align-items-center sidebar-section-title">
        <span>Группы активов</span>
        <button class="btn btn-sm btn-link p-0" onclick="window.showCreateGroupModal(null)" title="Создать группу">
            <i class="bi bi-plus-circle"></i>
        </button>
    </div>
    
    <div id="group-tree" class="group-tree">
        <!-- Статический элемент: Все активы (НЕ удаляется при обновлении) -->
        <div class="tree-node active" data-id="all">
            <i class="bi bi-globe folder-icon"></i>
            <span class="group-name" data-id="all">Все активы</span>
            <span class="badge bg-primary ms-auto" id="count-all">0</span>
        </div>
                <!-- Статический элемент: Без группы (НЕ удаляется при обновлении) -->
        <div class="tree-node" data-id="ungrouped" style="margin-top: 5px; border-top: 1px solid var(--bs-border-color); padding-top: 5px;">
            <i class="bi bi-inbox folder-icon"></i>
            <span class="group-name" data-id="ungrouped">Без группы</span>
            <span class="badge bg-secondary ms-auto" id="count-ungrouped">0</span>
        </div>

        <!-- Динамический контейнер для вложенных групп (Очищается JS) -->
        <div id="group-tree-root" style="padding-left: 0;">
            <!-- Сюда JS будет рендерить дерево групп -->
            <div class="text-center text-muted small py-3">Загрузка...</div>
        </div>

    </div>
</div>

<!-- Активные сканирования -->
<div class="sidebar-section">
    <div class="sidebar-section-title">Активные задачи</div>
    <div id="active-scans-list">
        <!-- Заполняется через JS (modules/groups.js) -->
        <div class="text-center text-muted small py-3">Нет активных задач</div>
    </div>
</div>

<script type="module">
    import { refreshGroupTree, initTreeTogglers } from '/static/js/modules/tree.js';
    import { 
        initActiveScans, 
        showCreateGroupModal,
        showRenameModal,
        showDeleteModal
    } from '/static/js/modules/groups.js';

    document.addEventListener('DOMContentLoaded', () => {
        // Инициализация дерева групп
        const treeContainer = document.getElementById('group-tree');
        if (treeContainer && !window.groupTreeInitialized) {
            window.groupTreeInitialized = true;
            // Загружаем дерево и затем инициализируем обработчики для статических элементов
            refreshGroupTree().then(() => {
                // Убеждаемся, что обработчики кликов навешены на статические элементы
                if (typeof window.initGroupTreeStaticListeners === 'function') {
                    window.initGroupTreeStaticListeners();
                }
                // Инициализируем сворачивание/разворачивание папок (если есть вложенность)
                if (typeof window.initTreeTogglers === 'function') {
                    window.initTreeTogglers();
                }
            });
        }

        // Инициализация активных сканирований
        initActiveScans();

        // Экспорт функций в глобальную область видимости
        window.showCreateGroupModal = showCreateGroupModal;
        window.refreshGroupTree = refreshGroupTree;
        window.showRenameModal = showRenameModal;
        window.showDeleteModal = showDeleteModal;
        
        // Экспорт filterByGroup и loadAssets для SPA функционала
        if (typeof window.filterByGroup === 'undefined') {
            import('/static/js/modules/tree.js').then(module => {
                window.filterByGroup = module.filterByGroup;
                window.loadAssets = module.loadAssets;
            });
        }
    });
</script>

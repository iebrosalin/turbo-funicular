<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Утилиты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 sidebar p-3 d-none d-md-block"><h5 class="mb-3"><i class="bi bi-folder-tree"></i> Группы</h5><div id="group-tree">{% include 'components/group_tree.html' %}</div></div>
            <div class="col-md-9 col-lg-10 p-4">
                <nav class="navbar navbar-light mb-4 px-3"><span class="navbar-brand mb-0 h1"><i class="bi bi-tools"></i> Утилиты</span><div class="d-flex align-items-center"><button class="btn btn-sm btn-outline-secondary me-2" id="themeToggle" title="Переключить тему"><i class="bi bi-sun-fill"></i></button><a href="{{ url_for('main.index" class="btn btn-outline-dark"><i class="bi bi-arrow-left"></i> На главную</a></div></nav>
                <div class="row">
                    <div class="col-md-6 col-lg-4 mb-4"><div class="card h-100" data-bs-toggle="modal" data-bs-target="#nmapRustscanModal" style="cursor: pointer;"><div class="card-body text-center p-4"><i class="bi bi-lightning-charge display-4 text-primary mb-3"></i><h5>Nmap → Rustscan</h5><p class="text-muted">Конвертация XML в список IP</p></div></div></div>
                    <div class="col-md-6 col-lg-4 mb-4"><div class="card h-100" data-bs-toggle="modal" data-bs-target="#extractPortsModal" style="cursor: pointer;"><div class="card-body text-center p-4"><i class="bi bi-door-open display-4 text-info mb-3"></i><h5>Извлечь порты</h5><p class="text-muted">Извлечение портов из Nmap XML</p></div></div></div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="nmapRustscanModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><form id="nmapRustscanForm"><div class="modal-header"><h5>Nmap → Rustscan</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div class="mb-3"><label>XML файл</label><input type="file" name="file" class="form-control" accept=".xml" required></div><div id="nmapRustscanResult" class="mt-3"></div></div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button><button type="submit" class="btn btn-primary"><i class="bi bi-download"></i> Скачать</button></div></form></div></div></div>
    <div class="modal fade" id="extractPortsModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><form id="extractPortsForm"><div class="modal-header"><h5>Извлечь порты</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div class="mb-3"><label>XML файл</label><input type="file" name="file" class="form-control" accept=".xml" required></div><div id="extractPortsResult" class="mt-3"></div></div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button><button type="submit" class="btn btn-primary"><i class="bi bi-download"></i> Скачать</button></div></form></div></div></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { refreshGroupTree, initTreeTogglers } from '/static/js/modules/tree.js';

        // Инициализация дерева групп
        document.addEventListener('DOMContentLoaded', () => {
            refreshGroupTree().then(() => {
                initTreeTogglers();
            });
        });
        // Инициализация дерева групп
        document.addEventListener('DOMContentLoaded', () => {
            refreshGroupTree().then(() => {
                initTreeTogglers();
            });
        });

        // Обработка загрузки файлов через JSON (base64)
        function handleUploadJson(formId, resId, url) {
            document.getElementById(formId).addEventListener('submit', async e => {
                e.preventDefault();
                const form = document.getElementById(formId);
                const fileInput = form.querySelector('input[type="file"]');
                const resultDiv = document.getElementById(resId);
                
                if (!fileInput.files.length) {
                    resultDiv.innerHTML = '<div class="alert alert-warning">Выберите файл</div>';
                    return;
                }
                
                const file = fileInput.files[0];
                const reader = new FileReader();
                
                resultDiv.innerHTML = '<div class="text-center"><div class="spinner-border"></div></div>';
                
                reader.onload = async (event) => {
                    const base64Data = event.target.result.split(',')[1];
                    
                    try {
                        const res = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                filename: file.name,
                                content: base64Data 
                            })
                        });
                        
                        if (res.ok) {
                            const blob = await res.blob();
                            const u = window.URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = u;
                            const disposition = res.headers.get('Content-Disposition');
                            if (disposition) {
                                a.download = disposition.split('filename=')[1].replace(/"/g, '');
                            } else {
                                a.download = file.name.replace('.xml', '.txt');
                            }
                            document.body.appendChild(a);
                            a.click();
                            resultDiv.innerHTML = '<div class="alert alert-success">Готово!</div>';
                            setTimeout(() => {
                                bootstrap.Modal.getInstance(document.getElementById(formId.replace('Form', 'Modal'))).hide();
                                resultDiv.innerHTML = '';
                                form.reset();
                            }, 2000);
                        } else {
                            const err = await res.json();
                            resultDiv.innerHTML = `<div class="alert alert-danger">${err.error || err.detail}</div>`;
                        }
                    } catch (err) {
                        resultDiv.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
                    }
                };
                
                reader.onerror = () => {
                    resultDiv.innerHTML = '<div class="alert alert-danger">Ошибка чтения файла</div>';
                };
                
                reader.readAsDataURL(file);
            });
        }
        
        handleUploadJson('nmapRustscanForm', 'nmapRustscanResult', '/utilities/nmap-to-rustscan');
        handleUploadJson('extractPortsForm', 'extractPortsResult', '/utilities/extract-ports');
</body>
</html>

version: '3.8'

services:
  web:
    build: .
    container_name: asset_management
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:////app/instance/network_inventory.db}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      # Для разработки можно включить reload, но в production режиме это отключено
      - UVICORN_RELOAD=${UVICORN_RELOAD:-false}
    volumes:
      # Монтирование исходного кода для разработки (изменения локально применяются сразу)
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      # Сохранение базы данных SQLite между перезапусками
      - app_data:/app/instance
      - ./tests:/app/tests
    working_dir: /app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    # Ограничение ресурсов (опционально)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

volumes:
  app_data:
    driver: local
version: '3.8'

services:
  web:
    build: .
    container_name: asset_management
#    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/instance/assets.db}
      - FLASK_DEBUG=${FLASK_DEBUG:-False}
    volumes:
      # Монтирование исходного кода для разработки (изменения локально применяются сразу)
      - .:/app
      # Сохранение базы данных SQLite между перезапусками (поверх примонтированного кода)
      - app_data:/app/instance
    networks:
      - app_network
    # Ограничение ресурсов (опционально)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

networks:
  app_network:
    driver: bridge

volumes:
  app_data:
    driver: local
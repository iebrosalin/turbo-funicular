version: '3.8'

services:
  web:
    build: .
    container_name: asset_management
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:////app/instance/app.db}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - UVICORN_RELOAD=${UVICORN_RELOAD:-false}
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - app_data:/app/instance
      - ./tests:/app/tests
    working_dir: /app
    command: >
      sh -c "uvicorn backend.main:app --host 0.0.0.0 --port 5000"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

